  </defs>
  <rect width="640" height="280" rx="32" fill="url(#bg)"/>
  
  <rect x="240" y="40" width="160" height="200" rx="16" fill="white" filter="url(#shadow)"/>
  <rect x="256" y="70" width="128" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="256" y="90" width="128" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="256" y="110" width="100" height="8" rx="4" fill="#E2E8F0"/>
  
  <rect x="256" y="140" width="128" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="256" y="160" width="128" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="256" y="180" width="80" height="8" rx="4" fill="#E2E8F0"/>
  
  <text x="320" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#334155" filter="url(#shadow)">📖 Reading Passage</text>
  <text x="320" y="120" text-anchor="middle" font-size="64" opacity="0.2">✨</text>
